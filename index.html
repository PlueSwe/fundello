<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Utforska finansieringskällor för Global Child Foundation.">
  <title>Fundello | Finansiering</title>
  <link rel="icon" href="assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260608-8">
  <script src="app.js?v=20260608-8" defer></script>
</head>
<body data-page="funding">
  <header class="site-header">
    <nav class="nav container" aria-label="Huvudnavigation">
      <a class="brand" href="index.html"><img src="assets/fundello-logo.svg" alt="Fundello"></a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="nav-links">Meny</button>
      <div class="nav-links" id="nav-links">
        <a class="active" href="index.html">Finansiering <span class="nav-count" data-source-count>–</span></a>
        <a href="applications.html">Ansökningar</a>
      </div>
    </nav>
  </header>

  <main class="container page-main">
    <section class="filter-panel" aria-label="Filtrera finansieringskällor">
      <label class="search-wrap">
        <span class="sr-only">Sök finansieringskälla</span>
        <span aria-hidden="true">⌕</span>
        <input id="source-search" type="search" placeholder="Sök på namn, land eller kategori..." autocomplete="off">
      </label>
      <div class="filter-chips" id="category-filters"></div>
      <div class="source-count-row">
        <p class="result-count" id="source-count">Laddar finansieringskällor...</p>
        <button class="restore-hidden" id="restore-hidden" type="button" hidden></button>
      </div>
    </section>

    <div class="funding-column-headings" aria-label="Sortera finansieringskällor">
      <span></span>
      <button type="button" class="sort-heading" data-sort="name">Företag <span aria-hidden="true">↕</span></button>
      <button type="button" class="sort-heading" data-sort="difficulty">Svårighetsgrad <span aria-hidden="true">↕</span></button>
      <button type="button" class="sort-heading" data-sort="amount">Summa att söka <span aria-hidden="true">↕</span></button>
      <button type="button" class="sort-heading" data-sort="category">Kategori <span aria-hidden="true">↕</span></button>
      <button type="button" class="sort-heading" data-sort="deadline">Ansökningsdatum <span aria-hidden="true">↕</span></button>
      <span></span>
    </div>
    <section class="accordion-list funding-list" id="funding-list" aria-live="polite">
      <div class="skeleton accordion-item"></div><div class="skeleton accordion-item"></div>
    </section>
    <noscript><p class="notice">JavaScript behövs för att läsa och filtrera JSON-filen.</p></noscript>
  </main>

  <footer class="site-footer"><div class="container footer-inner"><img src="assets/fundello-logo.svg" alt="Fundello"><span>Global Child Foundation</span></div></footer>
</body>
</html>
