<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Följ Global Child Foundations finansieringsansökningar.">
  <title>Fundello | Ansökningar</title>
  <link rel="icon" href="assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260608-7">
  <script src="app.js?v=20260608-7" defer></script>
</head>
<body data-page="applications">
  <header class="site-header">
    <nav class="nav container" aria-label="Huvudnavigation">
      <a class="brand" href="index.html"><img src="assets/fundello-logo.svg" alt="Fundello"></a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="nav-links">Meny</button>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Finansiering <span class="nav-count" data-source-count>–</span></a>
        <a class="active" href="applications.html">Ansökningar</a>
      </div>
    </nav>
  </header>

  <main class="container page-main">
    <section class="kpi-grid status-summary-grid" id="application-kpis" aria-label="Ansökningssummering">
      <div class="skeleton card"></div><div class="skeleton card"></div>
      <div class="skeleton card"></div><div class="skeleton card"></div>
    </section>
    <div id="deadline-alerts" aria-live="polite"></div>

    <section class="filter-panel compact" aria-label="Filtrera ansökningar">
      <div class="filter-chips" id="status-filters"></div>
      <div class="application-toolbar">
        <p class="result-count" id="application-count">Laddar ansökningar...</p>
        <button class="reset-all-button" id="reset-all-applications" type="button">Nollställ alla</button>
      </div>
    </section>

    <section class="accordion-list" id="application-list" aria-live="polite"></section>
    <noscript><p class="notice">JavaScript behövs för att läsa ansökningsdata.</p></noscript>
  </main>

  <footer class="site-footer"><div class="container footer-inner"><img src="assets/fundello-logo.svg" alt="Fundello"><span>Global Child Foundation</span></div></footer>
</body>
</html>
